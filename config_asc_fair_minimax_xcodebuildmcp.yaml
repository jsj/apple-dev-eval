suite:
  output_root: ./runs/asc_fair_xcodebuildmcp
  timeout_sec: 1800
  scenario_timeouts_sec:
    shell_primed: 600
  stall_timeout_sec: 300
  trials_per_cell: 1
  random_seed: 1337
  plan_mode: blocked_by_scenario
  shuffle_within_scenario: true
  baseline_trials_per_scenario: 1
  summary_cache_strata: true
  run_baselines: false
  keep_workdirs: false
  fetch_remote: false
  validate_tasks: false
  clean_agent_env: true
  use_ccusage_for_codex: true
  prewarm_spm: false
  post_run_report: false
  env:
    PATH: /Users/james/.factory/bin:/Users/james/bin:/Users/james/.resend/bin:/Users/james/Library/pnpm:/opt/homebrew/opt/ghidra/libexec/support:/Users/james/Library/Python/3.14/bin:/Users/james/.bun/bin:/Users/james/.cargo/bin:/Users/james/.go/bin:/Users/james/.local/bin:/opt/homebrew/opt/python@3.14/libexec/bin:/Users/james/.nvm/versions/node/v22.22.1/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Library/Apple/usr/bin
project:
  repo_path: /Users/james/Developer/zrepos/zmisc/zmirror/XcodeBuildMCP
  base_ref: HEAD
  simulator_name: iPhone 17 Pro
  build_params: {}
agents:
  - id: droid-minimax
    kind: droid_exec_cli
    command:
      - droid
      - --settings
      - '{SETTINGS}'
      - exec
      - --cwd
      - '{WORKDIR}'
      - --auto
      - medium
      - --output-format
      - json
      - --model
      - custom:MiniMax-M2.7-highspeed
      - --append-system-prompt-file
      - '{WORKDIR}/AGENTS.md'
      - '{EXTRA_ARGS}'
      - '{PROMPT}'
    env: {}
    pricing: {}
mcp:
  enabled: false
  start_command: []
  stop_command: []
  env: {}
