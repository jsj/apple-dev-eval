tasks:
  - id: asc_testflight_groups_pagination_offline
    description: Validate the repo's offline TestFlight groups pagination surface and emit normalized JSON evidence.
    kind: capability
    prompt: |
      You are evaluating this repository for a shared App Store Connect baseline.

      Goal:
      - Validate that this repo has an offline/local way to cover TestFlight beta groups listing with pagination semantics.
      - Do NOT hit Apple servers.
      - Discover and run the smallest relevant local command(s) or test(s) in this repo.
      - Write a file named `asc_eval_result.json` in the current working directory.

      Required JSON schema:
      {
        "scenario": "asc_testflight_groups_pagination_offline",
        "tool_family": "xc-cli" | "app-store-connect-cli" | "unknown",
        "offline": true,
        "passed": true,
        "command": "the main command or test command you ran",
        "evidence": {
          "pagination": true,
          "json_output": true,
          "no_live_apple": true
        },
        "notes": "short summary"
      }

      Rules:
      - Prefer existing local tests, fixtures, emulator-backed tests, or canned transport tests.
      - If multiple options exist, use the smallest deterministic one.
      - Exit immediately after the JSON file is written.
    setup_commands: []
    graders:
      - type: json_assert
        path: asc_eval_result.json
        expect:
          scenario: asc_testflight_groups_pagination_offline
          offline: true
          passed: true
          evidence.pagination: true
          evidence.json_output: true
          evidence.no_live_apple: true

